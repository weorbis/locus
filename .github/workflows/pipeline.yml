name: Pipeline

on:
  push:
    branches: [main, master]
    paths-ignore: ["**.md", ".gitignore"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for deterministic builds. Bumping is its own PR so the diff
  # surfaces toolchain changes and CI validates them before they land.
  FLUTTER_VERSION: "3.41.9"
  JAVA_VERSION: "17"
  XCODE_VERSION: "16.2"

defaults:
  run:
    shell: bash

jobs:
  # -----------------------------------------------------------------
  # STAGE 1: QUALITY ASSURANCE
  # -----------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - run: flutter pub get

      - name: Version pins in sync with pubspec
        run: dart run tool/sync_version.dart --check

      - name: Format check
        run: dart format --set-exit-if-changed --output=none .

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Unit Tests
        run: flutter test --coverage

      - name: Upload codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info

      - name: Install pana
        run: |
          dart pub global activate pana
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Pana Score
        run: pana --no-warning --exit-code-threshold 130

  android-check:
    name: Android Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
      - run: flutter pub get

      - name: Build Example APK
        run: cd example && flutter build apk --debug

  ios-check:
    name: iOS Check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Build Example iOS
        run: cd example && flutter build ios --no-codesign --debug

  # -----------------------------------------------------------------
  # STAGE 2: QUALITY GATE
  # -----------------------------------------------------------------
  quality-gate:
    name: Quality Gate
    needs: [code-quality, android-check, ios-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Final Review
        run: |
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "::error::Code quality failed"
            exit 1
          fi
          if [ "${{ needs.android-check.result }}" != "success" ]; then
            echo "::error::Android check failed"
            exit 1
          fi
          if [ "${{ needs.ios-check.result }}" != "success" ]; then
            echo "::error::iOS check failed"
            exit 1
          fi
          echo "All quality checks passed!"

  # -----------------------------------------------------------------
  # STAGE 3: RELEASE (GitHub Tag & Release only)
  # -----------------------------------------------------------------
  release:
    name: Release
    needs: [quality-gate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version from pubspec.yaml
        id: check_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse version from pubspec.yaml"
            exit 1
          fi

          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            echo "Tag v$VERSION already exists on remote. Skipping release."
            echo "do_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version $VERSION detected. Proceeding with release."
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check_version.outputs.do_release == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ steps.check_version.outputs.VERSION }}" -m "Release v${{ steps.check_version.outputs.VERSION }}"
          git push origin "v${{ steps.check_version.outputs.VERSION }}"

      - name: Create GitHub Release
        if: steps.check_version.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.check_version.outputs.VERSION }}"
          generate_release_notes: true
          body: |
            Release v${{ steps.check_version.outputs.VERSION }}

            Note: pub.dev publishing must be performed manually.
            See CHANGELOG.md for details.
