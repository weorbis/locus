name: locus
description: Core background geolocation SDK of the WeOrbis ecosystem for Flutter. Native tracking, geofencing, activity recognition, and sync.
# Single source of truth for the SDK version. After bumping, run:
#   dart run tool/sync_version.dart
# to propagate to the Dart constants (lib/src/config/geolocation_config.dart,
# bin/*.dart). Gradle (android/build.gradle.kts) and CocoaPods
# (ios/locus.podspec) read this line directly at build time.
version: 2.3.1
homepage: https://github.com/weorbis/locus
repository: https://github.com/weorbis/locus
issue_tracker: https://github.com/weorbis/locus/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  # device_info_plus 12.4.0 ships a forward-looking `@available(iOS 26.1, *)`
  # check that calls `[NSProcessInfo isiOSAppOnVision]` — a selector no
  # shipping Xcode SDK declares yet, so 12.4.x fails to compile under iOS
  # builds on every current toolchain. Pin to 12.3.x until the upstream
  # author releases a fixed 12.4.x or 12.5.x. Caret (^12.3.0) would resolve
  # to 12.4.0 and reintroduce the breakage.
  device_info_plus: '>=12.3.0 <12.4.0'
  logging: ^1.3.0
  # CLI dependency. Consumed only by `bin/*.dart` (locus / setup / doctor /
  # migrate executables). Pub's `executables:` contract requires CLI deps
  # to live in `dependencies:` so `dart run locus:setup` works for hosts;
  # moving `args` to `dev_dependencies:` would silently break the CLI for
  # every consumer. Removing the dep entirely (hand-rolled arg parsing in
  # `bin/`) is tracked as a follow-up.
  args: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

executables:
  locus: locus
  setup: setup
  doctor: doctor
  migrate: migrate

flutter:
  plugin:
    platforms:
      android:
        package: dev.locus
        pluginClass: LocusPlugin
      ios:
        pluginClass: LocusPlugin
